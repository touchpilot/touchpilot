# Label taxonomy for GitHub issues and pull requests.
# Apply these labels in the repository settings or with a label sync tool.

- name: "type: bug"
  color: "d73a4a"
  description: "Broken or unexpected behavior."
- name: "type: feature"
  color: "a2eeef"
  description: "New capability or product behavior."
- name: "type: enhancement"
  color: "a2eeef"
  description: "Improvement to existing behavior."
- name: "type: docs"
  color: "0075ca"
  description: "Documentation-only or documentation-focused work."
- name: "type: refactor"
  color: "cfd3d7"
  description: "Internal code change without intended behavior change."
- name: "type: test"
  color: "bfe5bf"
  description: "Test coverage, fixtures, or validation work."
- name: "type: chore"
  color: "ededed"
  description: "Maintenance, dependencies, or repository upkeep."
- name: "type: other"
  color: "ededed"
  description: "Work that does not match another type label."

- name: "area: android-control"
  color: "5319e7"
  description: "AccessibilityService, Android actions, UI observation, or tool execution."
- name: "area: agent"
  color: "5319e7"
  description: "Agent loop, prompts, provider routing, or command parsing."
- name: "area: local-inference"
  color: "5319e7"
  description: "Local router, LiteRT, ExecuTorch, llama.cpp, or model runtime work."
- name: "area: skills"
  color: "5319e7"
  description: "Markdown skills, skill loading, or tool allowlists."
- name: "area: mcp"
  color: "5319e7"
  description: "MCP client/server interoperability."
- name: "area: security"
  color: "5319e7"
  description: "Approvals, policy, secrets, privacy, or sensitive workflows."
- name: "area: ui"
  color: "5319e7"
  description: "Android app UI and UX."
- name: "area: ci"
  color: "5319e7"
  description: "GitHub Actions, lint, build, and repository automation."
- name: "area: docs"
  color: "5319e7"
  description: "Roadmap, architecture, examples, or documentation."

- name: "status: needs-triage"
  color: "fbca04"
  description: "Needs initial review and labeling."
- name: "status: needs-design"
  color: "fbca04"
  description: "Needs design, policy, or architecture discussion."
- name: "status: blocked"
  color: "b60205"
  description: "Blocked by another decision, issue, or dependency."
- name: "status: ready"
  color: "0e8a16"
  description: "Ready for implementation."
- name: "status: in-progress"
  color: "1d76db"
  description: "Actively being worked on."
