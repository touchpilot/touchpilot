name: Android

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-test-lint:
    name: Build, Test, Lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          # Install only what build/test/lint need. The default ("tools …")
          # pulls the Android Emulator, whose download intermittently fails to
          # unzip on the runner ("Error on ZipFile unknown archive"). The
          # emulator is only needed by the separate live-tests workflow.
          packages: 'platform-tools platforms;android-35 build-tools;35.0.0'

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Run Android lint
        run: ./gradlew lintDebug
