name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-35 build-tools;35.0.0"

      - name: Prepare release keystore
        env:
          TOUCHPILOT_RELEASE_KEYSTORE_BASE64: ${{ secrets.TOUCHPILOT_RELEASE_KEYSTORE_BASE64 }}
          TOUCHPILOT_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.TOUCHPILOT_RELEASE_KEYSTORE_PASSWORD }}
          TOUCHPILOT_RELEASE_KEY_ALIAS: ${{ secrets.TOUCHPILOT_RELEASE_KEY_ALIAS }}
          TOUCHPILOT_RELEASE_KEY_PASSWORD: ${{ secrets.TOUCHPILOT_RELEASE_KEY_PASSWORD }}
        run: |
          keystore_path="$RUNNER_TEMP/touchpilot-release.jks"
          printf '%s' "$TOUCHPILOT_RELEASE_KEYSTORE_BASE64" | base64 --decode > "$keystore_path"
          {
            echo "TOUCHPILOT_RELEASE_KEYSTORE=$keystore_path"
            echo "TOUCHPILOT_RELEASE_KEYSTORE_PASSWORD=$TOUCHPILOT_RELEASE_KEYSTORE_PASSWORD"
            echo "TOUCHPILOT_RELEASE_KEY_ALIAS=$TOUCHPILOT_RELEASE_KEY_ALIAS"
            echo "TOUCHPILOT_RELEASE_KEY_PASSWORD=$TOUCHPILOT_RELEASE_KEY_PASSWORD"
          } >> "$GITHUB_ENV"

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
