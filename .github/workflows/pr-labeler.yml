name: PR Labeler

"on":
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to label
        required: true
        type: string

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  label:
    name: Apply PR labels
    runs-on: ubuntu-latest

    steps:
      - name: Resolve PR number
        id: pr
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
          INPUT_PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "number=$INPUT_PR_NUMBER" >> "$GITHUB_OUTPUT"
          else
            echo "number=$EVENT_PR_NUMBER" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out base repository
        uses: actions/checkout@v4

      - name: Ensure labels exist
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh label create "type: bug" --color d73a4a --description "Broken or unexpected behavior." --force
          gh label create "type: feature" --color a2eeef --description "New capability or product behavior." --force
          gh label create "type: enhancement" --color a2eeef --description "Improvement to existing behavior." --force
          gh label create "type: docs" --color 0075ca --description "Documentation-only or documentation-focused work." --force
          gh label create "type: refactor" --color cfd3d7 --description "Internal code change without intended behavior change." --force
          gh label create "type: test" --color bfe5bf --description "Test coverage, fixtures, or validation work." --force
          gh label create "type: chore" --color ededed --description "Maintenance, dependencies, or repository upkeep." --force
          gh label create "type: other" --color ededed --description "Work that does not match another type label." --force
          gh label create "area: android-control" --color 5319e7 --description "AccessibilityService, Android actions, UI observation, or tool execution." --force
          gh label create "area: agent" --color 5319e7 --description "Agent loop, prompts, provider routing, or command parsing." --force
          gh label create "area: local-inference" --color 5319e7 --description "Local router, LiteRT, ExecuTorch, llama.cpp, or model runtime work." --force
          gh label create "area: skills" --color 5319e7 --description "Markdown skills, skill loading, or tool allowlists." --force
          gh label create "area: mcp" --color 5319e7 --description "MCP client/server interoperability." --force
          gh label create "area: security" --color 5319e7 --description "Approvals, policy, secrets, privacy, or sensitive workflows." --force
          gh label create "area: ui" --color 5319e7 --description "Android app UI and UX." --force
          gh label create "area: ci" --color 5319e7 --description "GitHub Actions, lint, build, and repository automation." --force
          gh label create "area: docs" --color 5319e7 --description "Roadmap, architecture, examples, or documentation." --force
          gh label create "status: needs-triage" --color fbca04 --description "Needs initial review and labeling." --force
          gh label create "status: needs-design" --color fbca04 --description "Needs design, policy, or architecture discussion." --force
          gh label create "status: blocked" --color b60205 --description "Blocked by another decision, issue, or dependency." --force
          gh label create "status: ready" --color 0e8a16 --description "Ready for implementation." --force
          gh label create "status: in-progress" --color 1d76db --description "Actively being worked on." --force

      - name: Apply one PR label
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          title="$(gh pr view "$PR_NUMBER" --repo "$GH_REPO" --json title --jq '.title' | tr '[:upper:]' '[:lower:]')"
          files="$(gh pr view "$PR_NUMBER" --repo "$GH_REPO" --json files --jq '.files[].path')"

          label="type: other"

          if echo "$title" | grep -Eq '(^|[^a-z])(fix|bug|bugfix)([^a-z]|$)'; then
            label="type: bug"
          elif echo "$title" | grep -Eq '(^|[^a-z])(feat|feature)([^a-z]|$)'; then
            label="type: feature"
          elif echo "$title" | grep -Eq '(^|[^a-z])(enhance|enhancement|improve|improvement)([^a-z]|$)'; then
            label="type: enhancement"
          elif echo "$title" | grep -Eq '(^|[^a-z])(refactor)([^a-z]|$)'; then
            label="type: refactor"
          elif echo "$title" | grep -Eq '(^|[^a-z])(docs|doc)([^a-z]|$)' || echo "$files" | grep -Eq '(^docs/|^examples/|\.md$)'; then
            label="type: docs"
          elif echo "$title" | grep -Eq '(^|[^a-z])(test|tests)([^a-z]|$)' || echo "$files" | grep -Eq 'Test\.(kt|java|cpp)$'; then
            label="type: test"
          elif echo "$title" | grep -Eq '(^|[^a-z])(chore|ci|build)([^a-z]|$)' || echo "$files" | grep -Eq '^\.github/|^gradle/|^gradlew'; then
            label="type: chore"
          fi

          for existing in "type: bug" "type: feature" "type: enhancement" "type: docs" "type: refactor" "type: test" "type: chore" "type: other" "status: needs-triage"; do
            encoded="${existing// /%20}"
            gh api --method DELETE "repos/${GH_REPO}/issues/${PR_NUMBER}/labels/${encoded}" --silent || true
          done

          gh api \
            --method POST \
            "repos/${GH_REPO}/issues/${PR_NUMBER}/labels" \
            --field labels[]="$label"
